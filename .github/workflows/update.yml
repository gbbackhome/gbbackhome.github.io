name: Auto-Update Portfolio Data

on:
  schedule:
    - cron: '0 0 * * *' # 매일 1회 (UTC 00:00 = KST 09:00)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install googleapis

      - name: Fetch Google Sheets data
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          SHEET_ID: ${{ vars.SHEET_ID }}
          SHEET_NAME: ${{ vars.SHEET_NAME }}
        run: node fetch-data.js

      - name: Commit and push if changed
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "Auto-update portfolio data"
          git pull --rebase origin main
          git push
